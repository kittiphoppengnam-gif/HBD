<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>...</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #f5c842;
    --rose: #e8547a;
    --cream: #fff8f0;
    --deep: #1a0a2e;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--deep);
    overflow: hidden;
    font-family: 'Dancing Script', cursive;
    position: relative;
  }

  /* Stars */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
  }
  .star {
    position: absolute;
    width: 3px; height: 3px;
    background: white;
    border-radius: 50%;
    animation: twinkle 2s infinite alternate;
  }

  @keyframes twinkle {
    from { opacity: 0.2; transform: scale(1); }
    to   { opacity: 1;   transform: scale(1.5); }
  }

  /* Center container */
  .center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3rem;
    z-index: 10;
  }

  /* The Button */
  .btn {
    position: relative;
    padding: 1.2rem 3.5rem;
    font-family: 'Dancing Script', cursive;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--deep);
    background: linear-gradient(135deg, var(--gold), #ffaa00, var(--gold));
    border: none;
    border-radius: 60px;
    cursor: pointer;
    box-shadow: 0 0 30px rgba(245,200,66,0.5), 0 0 80px rgba(245,200,66,0.2);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    overflow: visible;
  }
  .btn::before {
    content: '🎂';
    margin-right: 0.5rem;
    font-size: 1.4rem;
  }
  .btn:hover {
    transform: scale(1.06);
    box-shadow: 0 0 50px rgba(245,200,66,0.8), 0 0 100px rgba(245,200,66,0.3);
  }
  .btn:active { transform: scale(0.97); }

  /* Message */
  .message {
    opacity: 0;
    transform: translateY(30px) scale(0.8);
    transition: opacity 0.6s cubic-bezier(.22,1,.36,1), transform 0.6s cubic-bezier(.22,1,.36,1);
    text-align: center;
    pointer-events: none;
  }
  .message.show {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  .message h1 {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(2.5rem, 8vw, 5.5rem);
    background: linear-gradient(135deg, var(--gold), var(--rose), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
    filter: drop-shadow(0 0 20px rgba(245,200,66,0.4));
    animation: shimmer 3s linear infinite;
    background-size: 200%;
  }

  @keyframes shimmer {
    0%   { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }

  .message p {
    margin-top: 0.8rem;
    color: rgba(255,248,240,0.7);
    font-size: 1.3rem;
    letter-spacing: 0.05em;
  }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 10px; height: 14px;
    top: -20px;
    border-radius: 2px;
    pointer-events: none;
    animation: fall linear forwards;
    z-index: 999;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="center">
  <div class="message" id="msg">
    <h1>Happy Birthday!</h1>
    <p>✨ ขอให้มีความสุข เรียนเก่งๆ ✨</p>
  </div>

  <button class="btn"  onclick="celebrate()">Click!</button>
</div>

<script>
  // Generate stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top  = Math.random() * 100 + '%';
    s.style.animationDelay = Math.random() * 3 + 's';
    s.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    starsEl.appendChild(s);
  }

  const colors = ['#f5c842','#e8547a','#a78bfa','#34d399','#60a5fa','#fb923c'];

  function launchConfetti() {
    for (let i = 0; i < 80; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.width = (8 + Math.random() * 8) + 'px';
        c.style.height = (12 + Math.random() * 8) + 'px';
        c.style.animationDuration = (2 + Math.random() * 3) + 's';
        c.style.transform = `rotate(${Math.random()*360}deg)`;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 5000);
      }, i * 30);
    }
  }

  let celebrated = false;
  function celebrate() {
    const msg = document.getElementById('msg');
    const btn = document.getElementById('btn');
    msg.classList.toggle('show');
    launchConfetti();
    if (!celebrated) {
      btn.textContent = '';
      btn.insertAdjacentHTML('afterbegin','🎉 อีกครั้ง!');
      celebrated = true;
    }
  }
</script>
</body>
</html>
